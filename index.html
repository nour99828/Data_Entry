<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام صيانة محطة تشرين</title>

<style>
/* التنسيقات الأصلية كما هي تماماً دون أي تعديل */
:root{
--primary:#54bcec;
--primary-dark:#1c2e7e;
--bg:#0b1220;
--card:rgba(55, 69, 92, 0.85);
--input:#434f64;
--border:#1f2a3d;
--text:#e2e8f0;
--muted:#b3bfce;
--success:#10b981;
--danger:#ef4444;
--warning:#facc15;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:'Cairo',sans-serif;
background:linear-gradient(160deg,#394d75,#415583);
color:var(--text);
display:flex;
justify-content:center;
align-items: center; 
min-height: 100vh;
padding:40px 20px;
}

#loginSection {
    width: 100%;
    max-width: 450px;
    background: var(--card);
    backdrop-filter: blur(18px);
    border-radius: 28px;
    padding: 50px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    text-align: center;
    animation: fadeIn .6s ease;
}

#mainContainer {
    display: none;
    width:100%;
    max-width:950px;
}

.container{
width:100%;
background:var(--card);
backdrop-filter:blur(18px);
border-radius:28px;
padding:55px;
border:1px solid rgba(255,255,255,0.06);
box-shadow:0 40px 80px rgba(0,0,0,0.6);
animation:fadeIn .6s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(25px)}
to{opacity:1;transform:translateY(0)}
}

.header-title{
text-align:center;
font-size:26px;
font-weight:700;
padding:24px;
margin-bottom:55px;
border-radius:20px;
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
box-shadow:0 20px 40px rgba(43, 106, 133, 0.4);
color: white;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.form-group{
display:flex;
flex-direction:column;
position:relative;
text-align: right;
}

.full-width{
grid-column:1/-1;
}

label{
margin-bottom:10px;
font-size:16px;
font-weight:bold;
color:var(--muted);
}

input,select,textarea{
background:var(--input);
border:1px solid var(--border);
border-radius:16px;
padding:16px;
font-size:16px;
color:var(--text);
transition:.3s;
text-align: right;
}

input:hover,select:hover,textarea:hover{
border-color:var(--primary);
}

input:focus,select:focus,textarea:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(14,165,233,0.25);
}

textarea{
min-height:130px;
resize:vertical;
}

#statusBox{
margin-top:15px;
padding:14px;
border-radius:14px;
font-weight:600;
text-align:center;
background:rgba(255,255,255,0.04);
border:1px solid var(--border);
}

.bg-urgent{ background:rgba(239,68,68,0.15)!important; color:var(--danger); border-color:var(--danger)!important; }
.bg-normal{ background:rgba(250,204,21,0.15)!important; color:var(--warning); border-color:var(--warning)!important; }
.bg-Whenstopping{ background:rgba(16,185,129,0.15)!important; color:var(--success); border-color:var(--success)!important; }

.btn-container{
margin-top:50px;
display:flex;
gap:20px;
}

button{
flex:1;
padding:18px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.btn-submit, .btn-login{
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
color:white;
box-shadow:0 15px 35px rgba(14,165,233,0.35);
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.btn-submit:hover, .btn-login:hover{
transform:translateY(-4px);
filter: brightness(1.1);
background:#993232;
}

.btn-reset{
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
color:white;
border: 1px solid var(--border);

}
.btn-reset:hover{
background:#993232;
}

.spinner{
width:18px; height:18px;
border:3px solid rgba(255,255,255,0.3);
border-top:3px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{ to{transform:rotate(360deg)} }

.toast{
position:fixed; bottom:30px; left:30px;
padding:16px 24px; border-radius:16px;
font-weight:600; color:white;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
animation:slideIn .4s ease;
z-index:9999;
}

@keyframes slideIn{ from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>

<body>

<div id="loginSection">
    <div class="header-title" style="margin-bottom: 30px;">تسجيل الدخول</div>
    <div class="form-group" style="margin-bottom: 20px;">
        <label>اسم المستخدم</label>
        <input type="text" id="userInput" placeholder="أدخل اسم المستخدم">
    </div>
    <div class="form-group" style="margin-bottom: 30px;">
        <label>كلمة السر</label>
        <input type="password" id="passInput" placeholder="******">
    </div>
    <button class="btn-login" onclick="validateLogin()">دخول</button>
    <p id="errorMsg" style="color: var(--danger); margin-top: 15px; display: none; font-weight: bold;">خطأ في البيانات!</p>
</div>

<div id="mainContainer" class="container">
    <div class="header-title">إدخال صيانة المحطة</div>

    <form id="maintenanceForm">
        <input type="hidden" name="station" value="تشرين">
        <input type="hidden" name="currentUser" id="currentUserHidden">

        <div class="form-grid">
            <div class="form-group">
                <label>المجموعة</label>
                <select name="groupName" id="groupSelect" required>
                    <option disabled selected value="">اختر المجموعة</option>
                </select>
            </div>

            <div class="form-group">
                <label>رقم طلب الصيانة</label>
                <input type="text" name="orderNum" placeholder="أدخل رقم الطلب" required>
            </div>

            <div class="form-group">
                <label>تاريخ الطلب</label>
                <input type="date" name="orderDate" required>
            </div>

            <div class="form-group">
                <label>نوع العمل</label>
                <select name="workType" required>
                    <option disabled selected value="">اختر نوع العمل</option>
                    <option>كهرباء</option>
                    <option>ميكانيك</option>
                    <option>تحكم</option>
                    <option>كيمياء </option>
                    <option>مرافق </option>
                </select>
            </div>

            <div class="form-group">
                <label>وضع الطلب</label>
                <select name="orderPos" required>
                    <option disabled selected value="">اختر وضع الطلب</option>
                    <option>قيد التنفيذ</option>
                    <option>قيد الاختبار</option>
                    <option>تم التنفيذ</option>
                </select>
            </div>

            <div class="form-group">
                <label>الحالة</label>
                <select id="statusSelect" name="status" required>
                    <option disabled selected value="">اختر الحالة</option>
                    <option value="عاجل" >عاجل</option>
                    <option value="عادي" >عادي </option>
                    <option value="لحين التوقف"  >لحين التوقف</option>
                </select>
                <div id="statusBox">يرجى تحديد الحالة</div>
            </div>

            <div class="form-group full-width">
                <label>موضوع الطلب</label>
                <textarea name="subject" placeholder="عنوان مختصر"></textarea>
            </div>

            <div class="form-group full-width">
                <label>الأعمال المنفذة</label>
                <textarea name="doneWork" placeholder="ما الذي تم إنجازه؟"></textarea>
            </div>

            <div class="form-group full-width">
                <label>القطع التبديلية المستخدمة </label>
                <textarea name="spareParts" placeholder="ما القطع التبديلية التي تم استخدامها"></textarea>
            </div>

            <div class="form-group full-width">
                <label>ملاحظات</label>
                <textarea name="notes" placeholder="أي ملاحظات إضافية"></textarea>
            </div>
        </div>

        <div class="btn-container">
            <button type="submit" class="btn-submit" id="submitBtn">
                <span>إرسال البيانات</span>
            </button>
            <button type="reset" class="btn-reset" onclick="resetUI()">إعادة تعيين</button>
        </div>
    </form>
</div>

<script>
// --- إعدادات المستخدمين والمجموعات بناءً على طلبك ---
const userData = {
    "التيم": { 
        pass: "123", // يمكنك تغيير الباسورد هنا
        groups: ["الغازية الاولى", "الغازية الثانية", "الغازية الثالثة"] 
    },
     "الزارة": { 
        pass: "123", // يمكنك تغيير الباسورد هنا
        groups: ["بخارية أولى", "بخارية ثانية", "بخارية ثالثة"] 
    },
    "ديرعلي": { 
        pass: "123", 
        groups: ["الغازية الاولى ـ مركبة", "الغازية الثانية ـ مركبة", "البخارية ـ مركبة"] 
    },
     "السويدية": { 
        pass: "123", // يمكنك تغيير الباسورد هنا
        groups: ["غازية أولى", "غازية ثانية", ",غازية ثالثة","غازية رابعة","غازية خامسة"] 
    },
    "الناصرية": { 
        pass: "123", // يمكنك تغيير الباسورد هنا
        groups: [" الغازية الأولى -مركبة", " الغازية الثانية -مركبة",," الغازية الثالثة -مركبة"," البخارية -مركبة",] 
    },
      "بانياس": { 
        pass: "123", // يمكنك تغيير الباسورد هنا
        groups: ["بخارية أولى", "بخارية ثانية", "بخارية ثالثة", "بخارية رابعة"] 
    },
    "جندر": { 
        pass: "123", // يمكنك تغيير الباسورد هنا
        groups: [" الغازية الأولى -مركبة", " الغازية الثانية -مركبة"," البخارية الأولى -مركبة"," الغازية الثالثة -مركبة"," الغازية الرابعة -مركبة"," البخارية الثانية -مركبة",] 
    },
       "حلب": { 
        pass: "123", // يمكنك تغيير الباسورد هنا
        groups: ["بخارية أولى", "بخارية ثانية", "بخارية ثالثة", "بخارية رابعة", "بخارية خامسة", "العنفة الغازية"] 
    },
      "زيزون": { 
        pass: "123", // يمكنك تغيير الباسورد هنا
        groups: [" الغازية الأولى -مركبة", " الغازية الثانية -مركبة", " الغازية الثالثة -مركبة", " البخارية -مركبة"] 
    },
      "محردة": { 
        pass: "123", // يمكنك تغيير الباسورد هنا
        groups: ["بخارية أولى", "بخارية ثانية", "بخارية ثالثة"] 
    }
    // يمكنك إضافة الـ 3 مستخدمين الباقيين هنا بنفس الطريقة
};

function validateLogin() {
    const user = document.getElementById("userInput").value;
    const pass = document.getElementById("passInput").value;
    const error = document.getElementById("errorMsg");

    if (userData[user] && userData[user].pass === pass) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
        document.getElementById("currentUserHidden").value = user;

        const groupSelect = document.getElementById("groupSelect");
        const userGroups = userData[user].groups;
        
        groupSelect.innerHTML = '<option disabled selected value="">اختر المجموعة</option>';
        
        userGroups.forEach(group => {
            let option = document.createElement("option");
            option.text = group;
            option.value = group;
            groupSelect.add(option);
        });
    } else {
        error.style.display = "block";
    }
}

const scriptURL = 'https://script.google.com/macros/s/AKfycbzD1zzmHc7HVAhZvXNTxU1KZuM35dD91EPsp31Egs6-DI7ALwnfYpLf5LpR45dab0tb/exec';
const form=document.getElementById("maintenanceForm");
const submitBtn=document.getElementById("submitBtn");
const select=document.getElementById("statusSelect");
const box=document.getElementById("statusBox");

function resetUI() {
    box.textContent="يرجى تحديد الحالة";
    box.classList.remove("bg-urgent","bg-normal","bg-Whenstopping");
}

select.addEventListener("change",function(){
    box.classList.remove("bg-urgent","bg-normal","bg-Whenstopping");
    if(this.value==="عاجل"){
        box.textContent="الحالة: عاجل"; box.classList.add("bg-urgent");
    } else if(this.value==="عادي"){
        box.textContent="الحالة: عادي"; box.classList.add("bg-normal");
    } else if(this.value==="لحين التوقف"){
        box.textContent="الحالة: لحين التوقف"; box.classList.add("bg-Whenstopping");
    }
});

form.addEventListener("submit",function(e){
    e.preventDefault();
    submitBtn.disabled=true;
    submitBtn.innerHTML='<div class="spinner"></div> جاري الإرسال';

    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
    .then(response => {
        submitBtn.disabled=false;
        submitBtn.innerHTML='<span>إرسال البيانات</span>';
        const toast=document.createElement("div");
        toast.className="toast";
        toast.style.background="linear-gradient(135deg,#10b981,#059669)";
        toast.textContent="تم إرسال البيانات بنجاح ✔";
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(),3000);
        form.reset();
        resetUI();
    })
    .catch(error => {
        submitBtn.disabled=false;
        submitBtn.innerHTML='<span>إرسال البيانات</span>';
        alert("حدث خطأ في الإرسال");
    });
});
</script>

</body>
</html>
