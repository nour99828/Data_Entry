<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدخال صيانة المحطات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; --red: #ff4757; --yellow: #ffa502; --green: #2ed573; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; }
        input, select, textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; font-family: inherit; box-sizing: border-box; }
        #statusDisplay { margin-top: 15px; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; display: none; transition: 0.3s; }
        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(45deg, #3a7bd5, #00d2ff); border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h2><i class="fas fa-tools"></i> نظام الصيانة الذكي</h2>
    <form id="dataForm">
        <div class="form-group">
            <label>حالة الطلب</label>
            <select id="statusSelect" required>
                <option value="">-- اختر الحالة --</option>
                <option value="progress" style="color: #ff4757;">قيد التنفيذ (أحمر)</option>
                <option value="hold" style="color: #ffa502;">لحين التوقف (أصفر)</option>
                <option value="done" style="color: #2ed573;">مكتمل (أخضر)</option>
            </select>
            <div id="statusDisplay"></div>
        </div>
        <div class="form-group">
            <label>وضع الطلب</label>
            <input type="text" placeholder="مثال: مستعجل" required>
        </div>
        <div class="form-group">
            <label>الأعمال المنفذة</label>
            <textarea rows="3" placeholder="اكتب تفاصيل الإنجاز..."></textarea>
        </div>
        <button type="submit" class="btn-submit">تأكيد وإرسال البيانات</button>
    </form>
</div>
<script>
    const select = document.getElementById('statusSelect');
    const display = document.getElementById('statusDisplay');
    select.addEventListener('change', function() {
        display.style.display = 'block';
        if (this.value === 'progress') {
            display.textContent = 'الحالة: قيد التنفيذ';
            display.style.background = 'rgba(255, 71, 87, 0.2)';
            display.style.color = '#ff4757';
            display.style.border = '1px solid #ff4757';
        } else if (this.value === 'hold') {
            display.textContent = 'الحالة: لحين التوقف';
            display.style.background = 'rgba(255, 165, 2, 0.2)';
            display.style.color = '#ffa502';
            display.style.border = '1px solid #ffa502';
        } else if (this.value === 'done') {
            display.textContent = 'الحالة: مكتمل';
            display.style.background = 'rgba(46, 213, 115, 0.2)';
            display.style.color = '#2ed573';
            display.style.border = '1px solid #2ed573';
        }
    });
</script>
</body>
</html>
