<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام صيانة المحطة الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --electric: #00c6ff;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --input-bg: #0f172a;
            --border: #334155;
            --text-gray: #94a3b8;
            /* ألوان الحالات المطلوبة */
            --status-new: #3b82f6;      /* أزرق */
            --status-progress: #ef4444; /* أحمر */
            --status-done: #10b981;     /* أخضر */
            --status-closed: #6b7280;   /* رمادي */
        }

        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .header-title {
            text-align: center;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 40px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,198,255,0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }

        label {
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-gray);
            font-weight: bold;
        }

        input, select, textarea {
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--input-bg);
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--electric);
            box-shadow: 0 0 15px rgba(0,198,255,0.4);
        }

        /* تنسيق صندوق الحالة الملون */
        #statusBox {
            margin-top: 15px;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.4s;
            border: 2px solid transparent;
            background: rgba(255,255,255,0.05);
        }

        /* فئات الألوان للحالة */
        .bg-new { background: rgba(59, 130, 246, 0.2) !important; color: #3b82f6; border-color: #3b82f6 !important; }
        .bg-progress { background: rgba(239, 68, 68, 0.2) !important; color: #ef4444; border-color: #ef4444 !important; }
        .bg-done { background: rgba(16, 185, 129, 0.2) !important; color: #10b981; border-color: #10b981 !important; }
        .bg-closed { background: rgba(107, 114, 128, 0.2) !important; color: #9ca3af; border-color: #9ca3af !important; }

        .btn-container {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
        }

        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,198,255,0.4); }

        .btn-reset { background: #334155; color: white; }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .header-title { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">إدخال صيانة المحطة</div>

    <form id="maintenanceForm">
        <div class="form-grid">
            <div class="form-group">
                <label>المجموعة</label>
                <select required>
                    <option disabled selected>اختر المجموعة</option>
                    <option>محطة الكهرباء الرئيسية</option>
                    <option>محطة التوليد الشمالية</option>
                    <option>محطة التحويل 1</option>
                    <option>محطة الطوارئ</option>
                </select>
            </div>

            <div class="form-group">
                <label>رقم طلب الصيانة</label>
                <input type="number" placeholder="أدخل رقم الطلب">
            </div>

            <div class="form-group">
                <label>تاريخ الطلب</label>
                <input type="date" required>
            </div>

            <div class="form-group">
                <label>نوع العمل</label>
                <select required>
                    <option disabled selected>اختر نوع العمل</option>
                    <option>كهرباء</option>
                    <option>سباكة</option>
                    <option>تكييف</option>
                    <option>صيانة عامة</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>موضوع الطلب</label>
                <input type="text" placeholder="عنوان مختصر للمشكلة">
            </div>

            <div class="form-group">
                <label>وضع الطلب</label>
                <select required>
                    <option disabled selected>اختر وضع الطلب</option>
                    <option>عادي</option>
                    <option>مستعجل</option>
                    <option>طارئ</option>
                </select>
            </div>

            <div class="form-group">
                <label>الحالة</label>
                <select id="statusSelect" required>
                    <option disabled selected>اختر الحالة</option>
                    <option value="new">جديد</option>
                    <option value="progress">قيد التنفيذ</option>
                    <option value="done">مكتمل</option>
                    <option value="closed">مغلق</option>
                </select>
                <div id="statusBox">يرجى تحديد الحالة</div>
            </div>

            <div class="form-group full-width">
                <label>الأعمال المنفذة</label>
                <textarea placeholder="ما الذي تم إنجازه؟"></textarea>
            </div>

            <div class="form-group full-width">
                <label>ملاحظات</label>
                <textarea placeholder="أي ملاحظات إضافية"></textarea>
            </div>
        </div>

        <div class="btn-container">
            <button type="submit" class="btn-submit">إرسال البيانات</button>
            <button type="reset" class="btn-reset">إعادة تعيين</button>
        </div>
    </form>
</div>

<script>
    const select = document.getElementById("statusSelect");
    const box = document.getElementById("statusBox");

    select.addEventListener("change", function() {
        // إزالة الألوان السابقة
        box.classList.remove("bg-new", "bg-progress", "bg-done", "bg-closed");
        
        // إضافة اللون الجديد وتغيير النص بناءً على طلبك
        if(this.value === "new") {
            box.textContent = "الحالة: جديد";
            box.classList.add("bg-new");
        } else if(this.value === "progress") {
            box.textContent = "الحالة: قيد التنفيذ (أحمر)";
            box.classList.add("bg-progress");
        } else if(this.value === "done") {
            box.textContent = "الحالة: مكتمل (أخضر)";
            box.classList.add("bg-done");
        } else if(this.value === "closed") {
            box.textContent = "الحالة: مغلق";
            box.classList.add("bg-closed");
        }
    });
</script>

</body>
</html>
